<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>Nexus — AI-Guided Self-Directed Learning Platform</title>
  <meta name="description"
    content="Nexus Mission Control: An AI-powered learning platform with personalized roadmaps, Socratic mentorship, verifiable artifacts, and accountability partner matching." />
  <meta name="keywords"
    content="nexus, learning platform, AI mentorship, self-directed learning, accountability partners" />
  <meta name="author" content="Sudheer Bez" />

  <!-- Open Graph -->
  <meta property="og:title" content="Nexus — AI-Guided Learning Platform" />
  <meta property="og:description"
    content="Personalized AI roadmaps, Socratic mentorship, and peer matching for self-directed learners." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://sudheerbez.github.io/nexus/" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧭</text></svg>" />

  <!-- Google Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Theme color for mobile browsers -->
  <meta name="theme-color" content="#0f172a" />

</head>

<body>
  <noscript>
    <div
      style="background:#0f172a;color:#e2e8f0;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;">
      <p>Nexus requires JavaScript to run. Please enable it in your browser settings.</p>
    </div>
  </noscript>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    window.addEventListener('error', function (event) {
      document.body.innerHTML += '<div style="background: white; color: red; padding: 20px; z-index: 9999; position: absolute; top:0; left: 0; right: 0; font-family: monospace;"><h3>Frontend Crash:</h3><pre>' + (event.error ? event.error.stack : event.message) + '</pre></div>';
    });
    window.addEventListener('unhandledrejection', function (event) {
      document.body.innerHTML += '<div style="background: white; color: red; padding: 20px; z-index: 9999; position: absolute; top:0; left: 0; right: 0; font-family: monospace;"><h3>Unhandled Promise Rejection:</h3><pre>' + (event.reason ? (event.reason.stack || event.reason.message || event.reason) : 'Unknown') + '</pre></div>';
    });
  </script>
</body>

</html>
